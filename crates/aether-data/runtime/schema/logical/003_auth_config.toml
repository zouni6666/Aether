[table.ldap_configs]
domain = "auth_config"
order = 40
primary_key = ["id"]

[[table.ldap_configs.columns]]
name = "id"
type = "int64"
auto_increment = true

[[table.ldap_configs.columns]]
name = "server_url"
type = "text"
length = 255

[[table.ldap_configs.columns]]
name = "bind_dn"
type = "long_text"

[[table.ldap_configs.columns]]
name = "bind_password_encrypted"
type = "long_text"
nullable = true

[[table.ldap_configs.columns]]
name = "base_dn"
type = "long_text"

[[table.ldap_configs.columns]]
name = "user_search_filter"
type = "text"
length = 512
default = "(uid={username})"

[[table.ldap_configs.columns]]
name = "username_attr"
type = "text"
length = 50
default = "uid"

[[table.ldap_configs.columns]]
name = "email_attr"
type = "text"
length = 50
default = "mail"

[[table.ldap_configs.columns]]
name = "display_name_attr"
type = "text"
length = 50
default = "cn"

[[table.ldap_configs.columns]]
name = "is_enabled"
type = "bool"
default = false

[[table.ldap_configs.columns]]
name = "is_exclusive"
type = "bool"
default = false

[[table.ldap_configs.columns]]
name = "use_starttls"
type = "bool"
default = false

[[table.ldap_configs.columns]]
name = "connect_timeout"
type = "int32"
default = 10

[[table.ldap_configs.columns]]
name = "created_at"
type = "unix_seconds"

[[table.ldap_configs.columns]]
name = "updated_at"
type = "unix_seconds"

