[table.system_configs]
domain = "auth_config"
order = 10
primary_key = ["id"]

[[table.system_configs.columns]]
name = "id"
type = "text_id"
length = 64

[[table.system_configs.columns]]
name = "key"
type = "text"
length = 255

[[table.system_configs.columns]]
name = "value"
type = "long_text"

[[table.system_configs.columns]]
name = "description"
type = "long_text"
nullable = true

[[table.system_configs.columns]]
name = "created_at"
type = "unix_seconds"

[[table.system_configs.columns]]
name = "updated_at"
type = "unix_seconds"

[[table.system_configs.uniques]]
name = "system_configs_key_key"
columns = ["key"]

[table.auth_modules]
domain = "auth_config"
order = 20
primary_key = ["id"]

[[table.auth_modules.columns]]
name = "id"
type = "text_id"
length = 64

[[table.auth_modules.columns]]
name = "module_type"
type = "text"
length = 128

[[table.auth_modules.columns]]
name = "enabled"
type = "bool"
default = true

[[table.auth_modules.columns]]
name = "config"
type = "json"

[[table.auth_modules.columns]]
name = "created_at"
type = "unix_seconds"

[[table.auth_modules.columns]]
name = "updated_at"
type = "unix_seconds"

[[table.auth_modules.uniques]]
name = "auth_modules_module_type_key"
columns = ["module_type"]

