name: Build app image

on:
  push:
    branches:
      - main
      - master
    paths:
      - "Dockerfile.app.local"
      - ".dockerignore"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "apps/**"
      - "crates/**"
      - "frontend/**"
      - ".github/workflows/build-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-app-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.name }}
      version: ${{ steps.image.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve image metadata
        id: image
        shell: bash
        run: |
          set -euo pipefail
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          version="$(git describe --tags --always 2>/dev/null || git rev-parse --short HEAD)"
          echo "name=${image}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.app.local
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            AETHER_BUILD_VERSION=${{ steps.image.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Update server
    runs-on: ubuntu-latest
    needs: build
    if: github.ref_name == github.event.repository.default_branch
    env:
      AETHER_DEPLOY_HOST: ${{ secrets.AETHER_DEPLOY_HOST }}
      AETHER_DEPLOY_USER: ${{ secrets.AETHER_DEPLOY_USER }}
      AETHER_DEPLOY_PORT: ${{ secrets.AETHER_DEPLOY_PORT }}
      AETHER_DEPLOY_SSH_KEY: ${{ secrets.AETHER_DEPLOY_SSH_KEY }}
    steps:
      - name: Check deployment secrets
        id: check
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${AETHER_DEPLOY_HOST}" ] && \
             [ -n "${AETHER_DEPLOY_USER}" ] && \
             [ -n "${AETHER_DEPLOY_SSH_KEY}" ]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "Deployment skipped: set AETHER_DEPLOY_HOST, AETHER_DEPLOY_USER and AETHER_DEPLOY_SSH_KEY repository secrets."
          fi

      - name: Deploy over SSH
        if: steps.check.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail

          port="${AETHER_DEPLOY_PORT:-22}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "${AETHER_DEPLOY_SSH_KEY}" > ~/.ssh/aether_deploy_key
          chmod 600 ~/.ssh/aether_deploy_key

          ssh-keyscan -p "${port}" -H "${AETHER_DEPLOY_HOST}" >> ~/.ssh/known_hosts

          ssh \
            -i ~/.ssh/aether_deploy_key \
            -p "${port}" \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${AETHER_DEPLOY_USER}@${AETHER_DEPLOY_HOST}"
